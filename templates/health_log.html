{% extends "base.html" %}
{% block title %}Log Health - SportEquity{% endblock %}
{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card shadow-lg">
        <div class="card-header bg-info text-white">
          <h4 class="mb-0"><i class="bi bi-heart-pulse"></i> Log Health Record</h4>
          <small>{{ athlete.name }}</small>
        </div>
        <div class="card-body p-4">
          <form method="POST">
            <div class="mb-3">
              <label class="form-label">Date *</label>
              <input type="date" class="form-control" name="date" value="{{ now }}" required>
            </div>
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Height (cm)</label>
                <input type="number" class="form-control" name="height" min="100" max="250" step="0.5" placeholder="e.g. 175">
              </div>
              <div class="col-md-6">
                <label class="form-label">Weight (kg)</label>
                <input type="number" class="form-control" name="weight" min="30" max="200" step="0.1" placeholder="e.g. 68">
                <small class="text-muted">BMI is calculated automatically</small>
              </div>
            </div>
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Resting Heart Rate (bpm)</label>
                <input type="number" class="form-control" name="heart_rate" min="30" max="150" placeholder="e.g. 62">
              </div>
              <div class="col-md-6">
                <label class="form-label">Blood Pressure</label>
                <input type="text" class="form-control" name="blood_pressure" placeholder="e.g. 120/80">
              </div>
            </div>
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Sleep Hours</label>
                <input type="number" class="form-control" name="sleep_hours" min="0" max="14" step="0.5" placeholder="e.g. 8">
              </div>
              <div class="col-md-6">
                <label class="form-label">Injuries / Issues</label>
                <input type="text" class="form-control" name="injury_notes" placeholder="Any pain or injuries?">
              </div>
            </div>
            <div class="alert alert-info">
              <small><strong>💡 Tip:</strong> Log your metrics weekly. Doctors can review these records directly on the platform.</small>
            </div>
            <div class="d-flex justify-content-end gap-2">
              <a href="{{ url_for('athlete_dashboard') }}" class="btn btn-secondary">Cancel</a>
              <button type="submit" class="btn btn-info text-white"><i class="bi bi-check-lg"></i> Save Record</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
