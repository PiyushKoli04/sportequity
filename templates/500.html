{% extends "base.html" %}

{% block title %}Server Error - SportEquity{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 text-center">
            <div style="font-size: 120px; color: #dc3545; margin: 20px 0;">
                <i class="bi bi-exclamation-triangle"></i>
            </div>
            <h1 class="display-1 text-danger">500</h1>
            <h2 class="mb-4">Server Error</h2>
            <p class="lead text-muted mb-4">Something went wrong on our end. Our team has been notified and is working on a fix.</p>
            <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
                    <i class="bi bi-house"></i> Go Home
                </a>
                <a href="javascript:location.reload()" class="btn btn-outline-secondary btn-lg">
                    <i class="bi bi-arrow-clockwise"></i> Retry
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
