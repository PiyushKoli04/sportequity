{% extends "base.html" %}
{% block title %}Log Diet - SportEquity{% endblock %}
{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card shadow-lg">
        <div class="card-header bg-warning text-white">
          <h4 class="mb-0"><i class="bi bi-cup-hot"></i> Log Meal / Diet</h4>
          <small>{{ athlete.name }}</small>
        </div>
        <div class="card-body p-4">
          <form method="POST">
            <div class="mb-3">
              <label class="form-label">Date *</label>
              <input type="date" class="form-control" name="date" value="{{ now }}" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Meal Description *</label>
              <input type="text" class="form-control" name="meal" required placeholder="e.g. Grilled chicken, rice, salad">
            </div>
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Calories (kcal) *</label>
                <input type="number" class="form-control" name="calories" min="0" max="5000" placeholder="e.g. 600" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Water Intake (ml)</label>
                <input type="number" class="form-control" name="water_intake" min="0" max="5000" placeholder="e.g. 500">
              </div>
            </div>
            <div class="row mb-4">
              <div class="col-md-4">
                <label class="form-label">Protein (g)</label>
                <input type="number" class="form-control" name="protein" min="0" max="300" placeholder="e.g. 35">
              </div>
              <div class="col-md-4">
                <label class="form-label">Carbs (g)</label>
                <input type="number" class="form-control" name="carbs" min="0" max="500" placeholder="e.g. 80">
              </div>
              <div class="col-md-4">
                <label class="form-label">Fats (g)</label>
                <input type="number" class="form-control" name="fats" min="0" max="200" placeholder="e.g. 15">
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label">Notes</label>
              <textarea class="form-control" name="notes" rows="2" placeholder="Any observations about the meal?"></textarea>
            </div>
            <div class="alert alert-info">
              <small><strong>🎯 Goal:</strong> Athletes should consume 1800–2500 kcal/day with ~30–35% protein, ~45–50% carbs, ~20–25% fats. Water: 2–3 L/day.</small>
            </div>
            <div class="d-flex justify-content-end gap-2">
              <a href="{{ url_for('athlete_dashboard') }}" class="btn btn-secondary">Cancel</a>
              <button type="submit" class="btn btn-warning text-white"><i class="bi bi-check-lg"></i> Log Meal</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
